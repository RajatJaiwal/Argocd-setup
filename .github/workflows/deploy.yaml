
# Workflow name shown in GitHub Actions
name: Deploy K3s + ArgoCD to EC2

# Trigger pipeline when code is pushed to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    # GitHub runner environment
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Configure SSH to connect to EC2
      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Step 3: SSH into EC2 and execute deployment scripts
      - name: Deploy K3s and ArgoCD on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            echo "Connected to EC2 instance"

            # Create working directory
            mkdir -p ~/Argocd-setup
            cd ~/Argocd-setup

            # Clone repository
            git clone https://github.com/RajatJaiwal/Argocd-setup.git

            # Navigate to deployment scripts directory
            cd Argocd-setup/Argocd/deployargocd/

            # Show files for confirmation
            echo "Files available in deployment directory:"
            ls

            # Give execute permission to scripts
            chmod +x deploycluster.sh setupargocd.sh

            # -----------------------------
            # Stage 1 : Deploy K3s Cluster
            # -----------------------------
            echo "Starting K3s cluster deployment..."
            ./deploycluster.sh

            echo "Cluster setup completed"

            # Wait a little for cluster stabilization
            sleep 20

            # -----------------------------
            # Stage 2 : Setup ArgoCD
            # -----------------------------
            echo "Starting ArgoCD setup..."
            ./setupargocd.sh

            echo "ArgoCD setup completed successfully"

          EOF
